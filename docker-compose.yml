services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: bilgesis_teklif
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - bilgesis_pgdata:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bilgesis_teklif
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  bilgesis_pgdata:
